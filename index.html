<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rob Jones — Product Designer</title>
    <meta name="description" content="UX & Product Designer with 5+ years across enterprise SaaS and 0→1 startups." />
  </head>
  <body>
    <!-- Theme init: runs sync before paint to prevent flash of wrong theme -->
    <script>
      try {
        var s = localStorage.getItem('theme')
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (s === 'dark' || (!s && d)) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
