<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rob Jones — Product Designer</title>
    <meta name="description" content="Rob Jones — UX Designer for enterprise SaaS and product builder for founders. Available for new roles." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://robjonesportfolio.vercel.app/" />
    <meta property="og:title"       content="Rob Jones — Product Designer" />
    <meta property="og:description" content="UX & Product Designer with 5+ years across enterprise SaaS and 0→1 startups." />
    <meta property="og:image"       content="https://robjonesportfolio.vercel.app/images/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Rob Jones — Product Designer" />
    <meta name="twitter:description" content="UX & Product Designer with 5+ years across enterprise SaaS and 0→1 startups." />
    <meta name="twitter:image"       content="https://robjonesportfolio.vercel.app/images/og-image.jpg" />
  </head>
  <body>
    <!-- Theme init: runs sync before paint to prevent flash of wrong theme -->
    <script>
      try {
        var s = localStorage.getItem('theme')
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (s === 'dark' || (!s && d)) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
